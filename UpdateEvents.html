<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Event Registration | E&M Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --peach: #fff5eb;
            --emerald: #10b981;
            --navy: #0f172a;
            --white: #ffffff;
            --rose: #e11d48;
            --slate: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--peach) 0%, #ffffff 100%);
            color: var(--navy);
            min-height: 100vh;
            padding-top: 100px;
        }

        /* --- NAVIGATION --- */
        header {
            background: var(--navy); color: white;
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-section img { height: 40px; width: 40px; border-radius: 10px; border: 2px solid var(--emerald); }

        nav a { color: #94a3b8; text-decoration: none; margin-left: 25px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--emerald); }

        /* --- FORM CONTAINER --- */
        .main-wrapper { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        .form-card {
            background: var(--white);
            padding: 50px;
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .form-header { text-align: center; margin-bottom: 40px; }
        .form-header h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .form-header p { color: var(--slate); font-weight: 500; }

        /* --- ID BADGE --- */
        .id-tracker {
            background: var(--navy);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px rgba(15, 23, 42, 0.1);
        }
        .id-tracker span { color: var(--emerald); font-weight: 800; }

        /* --- INPUT GROUPS --- */
        .form-section-title {
            margin: 40px 0 20px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--slate);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 5px; }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--navy);
            padding-left: 4px;
        }

        input, select {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            background: #f8fafc;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--emerald);
            outline: none;
            background: white;
            box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.1);
        }

        /* --- BUTTONS --- */
        .cta-button {
            width: 100%;
            padding: 20px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 40px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .cta-button:hover {
            background: var(--emerald);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.25);
        }

        .cta-button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .form-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <img src="EM.jpg" alt="Logo">
        <h1 style="font-size: 1.3rem; font-weight: 800;">E&M<span style="color:var(--emerald)">.</span>Portal</h1>
    </div>
    <nav>
        <a href="Home.html">Home</a>
        <a href="Events.html">My Events</a>
        <a href="UpdateEvents.html" class="active">Secure Create</a>
    </nav>
</header>

<main class="main-wrapper">
    <div class="form-card">
        <div class="form-header">
            <h2>Secure Event Registration</h2>
            <p>Deploy a new event instance to the E&M global registry.</p>
        </div>

        <div style="text-align: center;">
            <div class="id-tracker">
                <i class="fa-solid fa-fingerprint"></i>
                SESSION ID: <span id="displayEventID">INITIALIZING...</span>
            </div>
        </div>

        <form id="eventForm">
            <div class="form-section-title">Core Event Architecture</div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label><i class="fa-solid fa-tag"></i> Public Event Name</label>
                    <input type="text" id="eventName" required placeholder="e.g. Neo-Tech Global Summit 2026">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-layer-group"></i> Event Category</label>
                    <select id="eventType">
                        <option value="Corporate">Corporate Summit</option>
                        <option value="Wedding">Wedding</option>
                        <option value="Social">Social Gathering</option>
                        <option value="Party">Birthday Party</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-check"></i> Deployment Date</label>
                    <input type="datetime-local" id="eventDateTime" required>
                </div>

                <div class="form-group full-width">
                    <label><i class="fa-solid fa-map-pin"></i> Venue Coordinates</label>
                    <input type="text" id="venue" required placeholder="Full physical address or digital link">
                </div>
            </div>

            <div class="form-section-title">Ownership & Audit Trail</div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label><i class="fa-solid fa-user-shield"></i> Lead Registrar Name</label>
                    <input type="text" id="organizerName" required placeholder="Full legal name of organizer">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Secure Contact</label>
                    <input type="tel" id="phone" required placeholder="+91 123-456-7890">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-envelope-circle-check"></i> Verified Email</label>
                    <input type="email" id="email" required readonly style="background: #f1f5f9; color: var(--slate); cursor: not-allowed;">
                </div>
            </div>

            <button type="submit" class="cta-button" id="btnSubmit">
                <i class="fa-solid fa-shield-halved"></i>
                Finalize & Authorize Registration
            </button>
        </form>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-dQz6ZGrF6y-imzaSzKH7zm38C9os6Qc",
        authDomain: "event-planner-93419.firebaseapp.com",
        databaseURL: "https://event-planner-93419-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "event-planner-93419",
        storageBucket: "event-planner-93419.firebasestorage.app",
        messagingSenderId: "1028172808060",
        appId: "1:1028172808060:web:2c89bb3f5bfc744ffd2ef9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "Login.html";
        } else {
            document.getElementById('email').value = user.email;
        }
    });

    function generateUniqueID() {
        const timestamp = Date.now().toString().slice(-6);
        const randomStr = Math.random().toString(36).substring(2, 5).toUpperCase();
        return `EM-${timestamp}-${randomStr}`;
    }

    const currentEventID = generateUniqueID();
    document.getElementById('displayEventID').innerText = currentEventID;

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authorizing Registry...';

        const eventData = {
            eventID: currentEventID,
            eventName: document.getElementById('eventName').value,
            eventType: document.getElementById('eventType').value,
            dateTime: document.getElementById('eventDateTime').value,
            venue: document.getElementById('venue').value,
            organizerName: document.getElementById('organizerName').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            status: "Verified",
            createdAt: new Date().toISOString()
        };

        try {
            await set(ref(db, 'all_events/' + currentEventID), eventData);
            window.location.href = "Events.html";
        } catch (error) {
            alert("Security Error: " + error.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Finalize & Authorize Registration';
        }
    });
</script>
</body>
</html>
