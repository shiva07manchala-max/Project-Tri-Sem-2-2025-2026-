<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | E&M Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --peach: #fff5eb;
            --peach-dark: #fcd5ce;
            --emerald: #10b981;
            --navy: #0f172a;
            --white: #ffffff;
            --rose: #e11d48;
            --slate: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
            color: var(--navy);
        }

        /* Decorative Blurs */
        .bg-glow {
            position: fixed; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            z-index: 1; top: -100px; right: -100px;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header { text-align: center; margin-bottom: 35px; }

        .logo-img {
            width: 80px; height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid var(--emerald);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .header p { color: var(--slate); font-size: 0.95rem; font-weight: 500; }

        /* Form Layout */
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 800;
            font-size: 0.7rem;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: var(--slate);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #f1f5f9;
            border-radius: 15px; font-size: 0.95rem; font-weight: 600;
            transition: 0.3s; background: #f8fafc; font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--emerald);
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-submit {
            width: 100%; padding: 18px; background: var(--emerald); color: white;
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer;
            font-size: 1rem; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:hover { background: #059669; transform: translateY(-2px); }
        .btn-submit:disabled { background: #94a3b8; transform: none; cursor: not-allowed; }

        .footer-cta {
            text-align: center; margin-top: 30px;
            font-size: 0.9rem; color: var(--slate); font-weight: 500;
        }

        .footer-cta a { color: var(--emerald); font-weight: 800; text-decoration: none; }

        #error-msg {
            background: #fee2e2; color: var(--rose);
            padding: 14px; border-radius: 12px; font-size: 0.85rem;
            margin-bottom: 25px; text-align: center; display: none;
            font-weight: 600; border: 1px solid rgba(225, 29, 72, 0.1);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="signup-card">
    <div class="header">
        <img src="EM.jpg" alt="Logo" class="logo-img">
        <h1>Create Account</h1>
        <p>Join the elite E&M organizer network</p>
    </div>

    <div id="error-msg"></div>

    <form id="signupForm">
        <div class="name-row">
            <div class="form-group">
                <label>First Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="firstName" placeholder="John" required>
                </div>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-signature"></i>
                    <input type="text" id="lastName" placeholder="Doe" required>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="mobile" placeholder="+91 00000 00000" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="john@company.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Secure Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">Initialize Account</button>
    </form>

    <div class="footer-cta">
        Already registered? <a href="Login.html">Sign In Here</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Standard Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC-dQz6ZGrF6y-imzaSzKH7zm38C9os6Qc",
        authDomain: "event-planner-93419.firebaseapp.com",
        databaseURL: "https://event-planner-93419-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "event-planner-93419",
        storageBucket: "event-planner-93419.firebasestorage.app",
        messagingSenderId: "1028172808060",
        appId: "1:1028172808060:web:2c89bb3f5bfc744ffd2ef9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const errDiv = document.getElementById('error-msg');

        // Loading state
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Securing Your Profile...';
        errDiv.style.display = "none";

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const mobile = document.getElementById('mobile').value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // Store extra profile data in Realtime DB
            await set(ref(db, 'users/' + user.uid), {
                fullName: firstName + " " + lastName,
                mobile: mobile,
                email: email,
                role: 'organizer',
                createdAt: new Date().toISOString()
            });

            window.location.href = "Home.html";

        } catch (error) {
            errDiv.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Initialize Account";

            switch (error.code) {
                case 'auth/email-already-in-use':
                    errDiv.innerText = "This email is already registered.";
                    break;
                case 'auth/weak-password':
                    errDiv.innerText = "Security: Password must be at least 6 chars.";
                    break;
                case 'auth/invalid-email':
                    errDiv.innerText = "Please provide a valid email address.";
                    break;
                default:
                    errDiv.innerText = "System Error: " + error.message;
            }
        }
    });
</script>
</body>
</html>
